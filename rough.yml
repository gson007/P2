- hosts: invent
  remote_user: godsonan
  become: true
  ignore_errors: True
  gather_facts: yes

  tasks:
    - name: refresh root password
      raw: chage -d 2025-08-20 root; export http_proxy="http://proxy.vodacom.cd:8080";export https_proxy="http://proxy.vodacom.cd:8080"

    - name: copy microsoft.asc file
      copy:
        src: /home/godsonan/microsoft.asc
        dest: /var/tmp
        owner: root
        group: root
        remote_src: no
      when: ansible_distribution == "Ubuntu"

    - name: Ensure public key is shared
      authorized_key:
        user: godsonan
        state: present
        key: '{{item}}'
      with_file:
        - ~/.ssh/id_rsa.pub

    - name: Add MD RHEL8 repository
      yum_repository:
        name: packages-microsoft-com-prod-v8
        description: RHEL repository for MD package
        baseurl: https://cdkinjssvmst01.vodacom.cd/pulp/content/Default_Organization/Library/custom/MS_Defender/MS_Defender/
        enabled: yes
        gpgcheck: no
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
        sslverify: no
      when:
        - ansible_distribution_major_version == "8"
        - ansible_os_family == "RedHat"

    - name: Add MD RHEL9 repository
      yum_repository:
        name: packages-microsoft-com-prod-v9
        baseurl: https://cdkinjssvmst01.vodacom.cd/pulp/content/Default_Organization/Library/custom/MS_Defenderv9/MS_Defenderv9/
        description: RHEL repository for MD package
        enabled: yes
        gpgcheck: no
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
        sslverify: no
      when:
        - ansible_distribution_major_version == "9"
        - ansible_os_family == "RedHat"

    - name: Add MD RHEL7 repository
      yum_repository:
        name: packages-microsoft-com-prod-v7
        baseurl: https://cdkinjssvmst01.vodacom.cd/pulp/content/Default_Organization/Library/custom/MS_Defenderv7/MS_Defenderv7/
        description: RHEL repository for MD package
        enabled: yes
        gpgcheck: no
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
        sslverify: no
      when:
        - ansible_distribution_major_version == "7"
        - ansible_os_family == "RedHat"

    - name: setup repository for ubuntu 18.04
      apt_repository:
        repo: "deb [arch=amd64] https://packages.microsoft.com/ubuntu/18.04/prod bionic main"
        state: present
        update_cache: yes
        filename: microsoft-prod.list
      when: ansible_distribution=='Ubuntu' and ansible_distribution_major_version == "18"

    - name: setup repository for ubuntu 20.04
      apt_repository:
        repo: "deb [arch=amd64,armhf,arm64] https://packages.microsoft.com/ubuntu/20.04/prod focal main"
        state: present
        update_cache: yes
        filename: microsoft-prod.list
      when: ansible_distribution=="Ubuntu" and ansible_distribution_major_version == "20"

    - name: setup repository for ubuntu 22.04
      apt_repository:
        repo: "deb [arch=amd64,armhf,arm64] https://packages.microsoft.com/ubuntu/22.04/prod jammy main"
        state: present
        update_cache: yes
        filename: microsoft-prod.list
      when: ansible_distribution=="Ubuntu" and ansible_distribution_major_version == "22"

    - name: setup repository for ubuntu 24.04
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main"
        state: present
        update_cache: yes
        filename: microsoft-prod.list
      when: ansible_distribution=="Ubuntu" and ansible_distribution_major_version == "24"

    - name: setup repository for ubuntu 25.04
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/25.04/prod plucky main"
        state: present
        update_cache: yes
        filename: microsoft-prod.list
      when: ansible_distribution == "Ubuntu" and ansible_distribution_major_version == "25"

    - name: install microsoft apt key for Ubuntu 24 and above
      raw:
        cat /tmp/microsoft.asc | gpg --dearmor | tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
      when: ansible_distribution == "Ubuntu" and ansible_distribution_major_version >= "24"

    - name: install microsoft apt key
      script:
        cmd: /usr/bin/curl -sSL --no-check-certificate  https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
      when: ansible_distribution=="Ubuntu" and ansible_distribution_major_version <= "22"

    - name: setup internet proxy
      raw:
        export http_proxy="http://proxy.vodacom.cd:8080";export https_proxy="http://proxy.vodacom.cd:8080"

    - name: update ubuntu packages apt
      apt:
        update_cache: yes
      when:
        - ansible_os_family == "Debian" and ansible_distribution == "Ubuntu"

    - name: setup proxy
      raw:
        export http_proxy="http://proxy.vodacom.cd:8080";export https_proxy="http://proxy.vodacom.cd:8080"

    - name: Install required package RHEL
      package:
        name:
          - yum-utils
          - libnetfilter_queue
          - mdatp
        state: present
      when:
        - ansible_os_family == "RedHat"

    - name: install required Ubuntu package
      apt:
        name:
          - gpg
          - apt-transport-https
          - mdatp
          - expect
        state: present
        update_cache: yes
      when:
        - ansible_os_family == "Debian" and ansible_distribution == "Ubuntu"

    - name: Copy onboarding script
      copy:
        src: /home/godsonan/MicrosoftDefenderATPOnboardingLinuxServer.py
        dest: /opt/
        mode: 0777
        owner: root
        group: root

    - name: Onboard Linux system on RHEL8 and Ubuntu 20.04
      raw: python3 /opt/MicrosoftDefenderATPOnboardingLinuxServer.py
      when:
        - ansible_os_family == "RedHat" or ansible_os_family == "Debian"
        - ansible_distribution_major_version >= "8" or ansible_distribution_major_version >= "20"

    - name: Onboard Linux system on RHEL7 and Ubuntu lesser than 20.04
      raw: python /opt/MicrosoftDefenderATPOnboardingLinuxServer.py
      when:
        - ansible_os_family == "RedHat" or ansible_os_family == "Debian"
        - ansible_distribution_major_version == "7" or ansible_distribution_major_version == "18"

    - name: Copy mdatp managed json file
      copy:
        src: /home/godsonan/mdatp_managed.json
        dest: /etc/opt/microsoft/mdatp/managed/
        mode: 0777
        owner: root
        group: root

    - name: Restart daemon-reload
      raw: systemctl daemon-reload

    - name: Restart mdatp service
      service:
        name: mdatp
        state: restarted
        enabled: yes

    - name: Test healthy and org_id output
      raw: hostname; mdatp health --field healthy;mdatp health --field org_id;
    - name: set real time config
      raw:
        mdatp config real-time-protection --value enabled
    - name: set passive mode config
      raw:
        mdatp config passive-mode --value disabled; mdatp connectivity test

    - name: test mdatp connectivity
      raw:
        mdatp connectivity test
      register: mdatp_output

    - name: display test result
      debug:
        msg: '{{mdatp_output.stdout_lines}}'
